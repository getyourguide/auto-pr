name: Dependabot Approve

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-approve:
    name: Approve PR
    uses: getyourguide/actions/.github/workflows/dependabot-approve.yml@main
    with:
      targets: patch:all,minor:all
      pr-url: ${{ github.event.pull_request.html_url }}
